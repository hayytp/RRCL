<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Record - RRCL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-brand">Roblox Ranked Challenges List</div>
        <div class="nav-links">
            <a href="./" class="nav-btn">Home</a>
            <a href="list" class="nav-btn">Main List</a>
            <a href="leaderboard" class="nav-btn">Leaderboard</a>
            <a href="update" class="nav-btn">Live Feed</a>
            <a href="submit" class="nav-btn active">Submit</a>
        </div>
    </nav>

    <div class="main-layout">
        <div class="submit-container">
            <h2>Submit a Record</h2>
            <p>Fill out the details below to claim your points.</p>
            
            <form id="rrcl-submit-form">
                
                <div class="form-group">
                    <label for="roblox-name">Roblox Username *</label>
                    <input type="text" id="roblox-name" name="roblox-name" required>
                </div>

                <div class="form-group">
                    <label for="discord-name">Discord Username *</label>
                    <input type="text" id="discord-name" name="discord-name" placeholder="e.g. username#1234 or just username" required>
                </div>

                <div class="form-group">
                    <label for="tier-select">Choose Tier *</label>
                    <select id="tier-select" name="tier-select" required>
                        <option value="" disabled selected>Select a Tier...</option>
                        <option value="0">Tier 0</option>
                        <option value="1">Tier 1</option>
                        <option value="2">Tier 2</option>
                        <option value="3">Tier 3</option>
                        <option value="4">Tier 4</option>
                        <option value="5">Tier 5</option>
                        <option value="6">Tier 6</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Challenge(s) Completed *</label>
                    <div class="multi-select-container" id="multi-select-wrapper" style="pointer-events: none; opacity: 0.5;">
                        <div class="multi-select-header" id="multi-select-header">
                            <span id="multi-select-text">Waiting for Tier selection...</span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div class="multi-select-dropdown" id="multi-select-dropdown">
                            </div>
                    </div>
                    <input type="hidden" id="selected-challenges" name="selected-challenges" required>
                </div>

                <div class="form-group">
                    <label for="video-link">Proof Link *</label>
                    <input type="url" id="video-link" name="video-link" placeholder="YouTube, Google Drive, etc." required>
                </div>

                <div class="form-group">
                    <label for="submit-note">Leave a Note (Optional)</label>
                    <textarea id="submit-note" name="submit-note" rows="3" placeholder="Any extra info for the list mods?"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="main-submit-btn">Send Submission</button>
            </form>
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('main-submit-btn');
        const COOLDOWN_TIME = 120000; 

        // 1. FETCH CHALLENGES DATA
        const challengesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtXIb_sqcdrIBkTb9EJnprKldJeS_0M_LnsXLItE5IZfM9eG43h-KKl0g2TfG7RFepDnpQUjTRkmZh/pub?gid=0&single=true&output=csv';
        let tierData = { '0':[], '1':[], '2':[], '3':[], '4':[], '5':[], '6':[] };

        fetch(challengesCsvUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); 
                rows.forEach(row => {
                    if (!row.trim()) return; 
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!cols[1] || cols[1].trim() === '') return; 

                    let rawTier = cols[0].replace(/[^0-6]/g, '');
                    if (rawTier === '') return; 
                    const tier = rawTier[0]; 
                    const title = cols[1].trim().replace(/^"|"$/g, '');

                    if(tierData[tier] !== undefined) {
                        tierData[tier].push(title);
                    }
                });
            })
            .catch(err => console.error("Error loading challenge data.", err));

        // 2. CUSTOM DROPDOWN LOGIC
        const tierSelect = document.getElementById('tier-select');
        const multiWrapper = document.getElementById('multi-select-wrapper');
        const multiHeader = document.getElementById('multi-select-header');
        const multiDropdown = document.getElementById('multi-select-dropdown');
        const multiText = document.getElementById('multi-select-text');
        const hiddenChallengesInput = document.getElementById('selected-challenges');

        // Unlock challenges when tier is chosen
        tierSelect.addEventListener('change', function() {
            const selectedTier = this.value;
            multiWrapper.style.pointerEvents = "auto";
            multiWrapper.style.opacity = "1";
            multiText.innerText = "Select challenges...";
            multiDropdown.innerHTML = ""; // Clear old boxes
            hiddenChallengesInput.value = ""; // Reset hidden validation

            if(tierData[selectedTier]) {
                tierData[selectedTier].forEach(game => {
                    const label = document.createElement('label');
                    label.className = "checkbox-item";
                    label.innerHTML = `<input type="checkbox" value="${game}"> ${game}`;
                    
                    // Listen for clicks to update the header text
                    label.querySelector('input').addEventListener('change', updateSelectedCount);
                    multiDropdown.appendChild(label);
                });
            }
        });

        // Toggle Dropdown open/close
        multiHeader.addEventListener('click', () => {
            multiDropdown.classList.toggle('show');
        });

        // Close dropdown if clicking outside of it
        document.addEventListener('click', (e) => {
            if (!multiWrapper.contains(e.target)) {
                multiDropdown.classList.remove('show');
            }
        });

        function updateSelectedCount() {
            const checkedBoxes = multiDropdown.querySelectorAll('input[type="checkbox"]:checked');
            const selectedValues = Array.from(checkedBoxes).map(cb => cb.value);
            
            if (selectedValues.length === 0) {
                multiText.innerText = "Select challenges...";
                hiddenChallengesInput.value = "";
            } else if (selectedValues.length === 1) {
                multiText.innerText = selectedValues[0];
                hiddenChallengesInput.value = selectedValues[0];
            } else {
                multiText.innerText = `${selectedValues.length} Challenges Selected`;
                hiddenChallengesInput.value = selectedValues.join(', ');
            }
        }

        // 3. COOLDOWN LOGIC
        function checkCooldown() {
            const lastSubTime = localStorage.getItem('rrcl_last_submission');
            if (lastSubTime) {
                const timePassed = Date.now() - parseInt(lastSubTime);
                if (timePassed < COOLDOWN_TIME) {
                    const timeLeft = Math.ceil((COOLDOWN_TIME - timePassed) / 60000); 
                    submitBtn.innerText = `On Cooldown (${timeLeft}m left)`;
                    submitBtn.style.backgroundColor = "#555555";
                    submitBtn.disabled = true; 
                    submitBtn.style.cursor = "not-allowed";
                    return true; 
                }
            }
            return false;
        }
        checkCooldown();

        // 4. SUBMIT FORM LOGIC
        document.getElementById('rrcl-submit-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            if (checkCooldown()) return; 

            // Validate that at least one challenge was checked
            if (hiddenChallengesInput.value === "") {
                alert("Please select at least one challenge from the dropdown!");
                return;
            }

            submitBtn.innerText = "Sending..."; 
            submitBtn.disabled = true;

            const formData = {
                'roblox-name': document.getElementById('roblox-name').value,
                'discord-name': document.getElementById('discord-name').value,
                'tier': document.getElementById('tier-select').value,
                'challenge-name': hiddenChallengesInput.value,
                'video-link': document.getElementById('video-link').value,
                'note': document.getElementById('submit-note').value
            };

            const scriptURL = 'https://script.google.com/macros/s/AKfycbyXEqTqLiyiTmoYytFZ8H8dPH1LPfh-Y1tt0MKMP7FIJYhRrkfKfK-_78HdSyKEeUJHuw/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                submitBtn.innerText = "Submitted!";
                submitBtn.style.backgroundColor = "#1ea34d"; 
                document.getElementById('rrcl-submit-form').reset(); 
                
                // Reset custom dropdown UI
                multiWrapper.style.pointerEvents = "none";
                multiWrapper.style.opacity = "0.5";
                multiText.innerText = "Waiting for Tier selection...";
                multiDropdown.innerHTML = "";
                hiddenChallengesInput.value = "";
                
                localStorage.setItem('rrcl_last_submission', Date.now());
                setTimeout(() => { checkCooldown(); }, 3000);
            })
            .catch(error => {
                submitBtn.innerText = "Error! Try Again.";
                submitBtn.style.backgroundColor = "#ef4444"; 
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
