<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - RRCL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-brand">Roblox Ranked Challenges List</div>
<div class="nav-links">
            <a href="index.html" class="nav-btn active">Home</a>
            <a href="list.html" class="nav-btn">Main List</a>
            <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
            <a href="submit.html" class="nav-btn">Submit</a>
        </div>
    </nav>

    <div class="main-layout">
        <div class="leaderboard-container">
            <h2>The Hall of Fame</h2>
            <p>Best RRCL Players</p>
            
<div class="leaderboard-list" id="dynamic-leaderboard">
                <p style="color: #ccc; text-align: center;">Loading player data...</p>
            </div>

<script>
        // ⚠️ PASTE YOUR PUBLISHED CSV LINK HERE ⚠️
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHILLb1CTdxro6zyl73KXNxqA6f1ZXgjY6fz9LoUylWCt1ln_nEpsyeFW877ewAUA0qtYdVCGe4gXy/pub?gid=0&single=true&output=csv';

        fetch(csvUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); 
                const leaderboardContainer = document.getElementById('dynamic-leaderboard');
                leaderboardContainer.innerHTML = ''; 

                rows.forEach(row => {
                    if (!row.trim()) return; 
                    
                    const cols = row.split(',');
                    
                    // 🛡️ THE BULLETPROOF SHIELD: Ignores Google Sheets ghost rows!
                    if (!cols[1] || cols[1].trim() === '') return; 

                    const rank = cols[0];
                    const name = cols[1];
                    const total = cols[2];
                    const t0 = cols[3] || 0;
                    const t1 = cols[4] || 0;
                    const t2 = cols[5] || 0;
                    const t3 = cols[6] || 0;
                    const t4 = cols[7] || 0;

                    // THE "OPEN SPOT" DETECTOR
                    let displayName = name;
                    let opacityStyle = "";
                    if (name.trim() === "N/A") {
                        displayName = "<i style='color: #777777;'>[ Open Spot ]</i>";
                        opacityStyle = "style='opacity: 0.4;'"; 
                    }

                    // Assigns the gold/silver/bronze classes
                    let rankClass = '';
                    if (rank === '1' || rank === '#1') rankClass = 'rank-1';
                    else if (rank === '2' || rank === '#2') rankClass = 'rank-2';
                    else if (rank === '3' || rank === '#3') rankClass = 'rank-3';

                    // Builds the card
                    const playerCard = `
                        <div class="player-card ${rankClass}" ${opacityStyle}>
                            <div class="player-summary">
                                <div class="player-rank">#${rank.replace('#', '')}</div>
                                <div class="player-name">${displayName}</div>
                                <div class="player-score">${total} Total <span class="toggle-icon">+</span></div>
                            </div>
                            <div class="player-details">
                                <div class="details-inner">
                                    <div class="tier-stat"><span class="t-dot t-0">●</span> Tier 0: <strong>${t0}</strong></div>
                                    <div class="tier-stat"><span class="t-dot t-1">●</span> Tier 1: <strong>${t1}</strong></div>
                                    <div class="tier-stat"><span class="t-dot t-2">●</span> Tier 2: <strong>${t2}</strong></div>
                                    <div class="tier-stat"><span class="t-dot t-3">●</span> Tier 3: <strong>${t3}</strong></div>
                                    <div class="tier-stat"><span class="t-dot t-4">●</span> Tier 4: <strong>${t4}</strong></div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    leaderboardContainer.innerHTML += playerCard;
                });

                attachAccordionLogic();
            })
            .catch(error => {
                document.getElementById('dynamic-leaderboard').innerHTML = '<p style="color: #ef4444; text-align: center;">Error loading leaderboard data.</p>';
            });

        function attachAccordionLogic() {
            const summaries = document.querySelectorAll('.player-summary');
            summaries.forEach(summary => {
                summary.addEventListener('click', function() {
                    const card = this.parentElement;
                    card.classList.toggle('active');
                    const details = this.nextElementSibling;
                    if (details.style.maxHeight) {
                        details.style.maxHeight = null;
                    } else {
                        details.style.maxHeight = details.scrollHeight + "px";
                    }
                });
            });
        }
    </script>   
</body>
</html>
